# Bundled postgres + redis for local self-contained deploy.
# docker compose -f ops/docker/compose.bundled.yaml up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onepara_card}
      POSTGRES_USER: ${POSTGRES_USER:-onepara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onepara} -d ${POSTGRES_DB:-onepara_card}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-onepara}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onepara_card}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_SECRET: ${APP_SECRET:?set APP_SECRET}
      APP_ENV: production
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      APP_PAYMENT_URL: ${APP_PAYMENT_URL:?set APP_PAYMENT_URL}
      API_PORT: 80
      API_PUBLIC_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
      API_HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      BC_SECRET: ${BC_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PSP_DEFAULT_PROVIDER: ${PSP_DEFAULT_PROVIDER:-stripe}
      PAYTR_MERCHANT_ID: ${PAYTR_MERCHANT_ID:-}
      PAYTR_MERCHANT_KEY: ${PAYTR_MERCHANT_KEY:-}
      PAYTR_MERCHANT_SALT: ${PAYTR_MERCHANT_SALT:-}
      PAYTR_TEST_MODE: ${PAYTR_TEST_MODE:-0}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  web:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
    restart: unless-stopped
    environment:
      PORT: 80
      HOSTNAME: 0.0.0.0
      API_PUBLIC_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      APP_PAYMENT_URL: ${APP_PAYMENT_URL:?set APP_PAYMENT_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pg_data:
  redis_data:
