# Coolify production — prefer root /docker-compose.yaml (identical content).

services:
  api:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.api
    restart: unless-stopped
    networks:
      - default
      - coolify
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      APP_SECRET: ${APP_SECRET:?set APP_SECRET}
      APP_ENV: production
      APP_MARKETING_URL: ${APP_MARKETING_URL:?set APP_MARKETING_URL}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      APP_PAYMENT_URL: ${APP_PAYMENT_URL:?set APP_PAYMENT_URL}
      API_PORT: 80
      API_PUBLIC_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
      API_HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      UPLOAD_DIR: /app/data/uploads
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_ORIGIN_IP: ${CLOUDFLARE_ORIGIN_IP:-}
      CLOUDFLARE_ZONE_ID_ONEKART: ${CLOUDFLARE_ZONE_ID_ONEKART:-}
      CLOUDFLARE_ZONE_ID_ODEME: ${CLOUDFLARE_ZONE_ID_ODEME:-}
      CLOUDFLARE_ZONE_DOMAIN_ONEKART: ${CLOUDFLARE_ZONE_DOMAIN_ONEKART:-onekart.info}
      CLOUDFLARE_ZONE_DOMAIN_ODEME: ${CLOUDFLARE_ZONE_DOMAIN_ODEME:-odeme.click}
      CLOUDFLARE_AUTO_SYNC: ${CLOUDFLARE_AUTO_SYNC:-1}
      BC_SECRET: ${BC_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PSP_DEFAULT_PROVIDER: ${PSP_DEFAULT_PROVIDER:-stripe}
      PAYTR_MERCHANT_ID: ${PAYTR_MERCHANT_ID:-}
      PAYTR_MERCHANT_KEY: ${PAYTR_MERCHANT_KEY:-}
      PAYTR_MERCHANT_SALT: ${PAYTR_MERCHANT_SALT:-}
      PAYTR_TEST_MODE: ${PAYTR_TEST_MODE:-0}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
    volumes:
      - uploads_data:/app/data/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  web:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
        INTERNAL_API_URL: http://api:80
    restart: unless-stopped
    networks:
      - default
      - coolify
    environment:
      PORT: 80
      HOSTNAME: 0.0.0.0
      APP_MARKETING_URL: ${APP_MARKETING_URL:?set APP_MARKETING_URL}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      APP_PAYMENT_URL: ${APP_PAYMENT_URL:?set APP_PAYMENT_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  coolify:
    external: true
    name: ${COOLIFY_NETWORK:-coolify}

volumes:
  uploads_data:
