services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onepara_card
      POSTGRES_USER: onepara
      POSTGRES_PASSWORD: onepara
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onepara -d onepara_card"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://onepara:onepara@postgres:5432/onepara_card
      REDIS_URL: redis://redis:6379
      APP_SECRET: dev-secret-change-in-production
      APP_ENV: development
      WEB_PORT: 3105
      APP_BASE_URL: http://localhost:3105
      APP_PAYMENT_URL: http://localhost:3105
      API_PORT: 4105
      API_PUBLIC_URL: http://localhost:4105
      CORS_ORIGIN: http://localhost:3105
      PSP_DEFAULT_PROVIDER: stripe
    ports:
      - "4105:4105"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4105
    ports:
      - "3105:3105"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
