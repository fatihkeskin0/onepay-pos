# Production stack for Coolify — use Docker Compose Location: /docker-compose.yaml
# Uses external PostgreSQL + Redis (Coolify managed resources).
# Set DATABASE_URL and REDIS_URL in Coolify env to the external connection strings.

services:
  api:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.api
    restart: unless-stopped
    networks:
      - default
      - coolify
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      APP_SECRET: ${APP_SECRET:?set APP_SECRET}
      APP_ENV: production
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      APP_PAYMENT_URL: ${APP_PAYMENT_URL:?set APP_PAYMENT_URL}
      API_PORT: 4105
      API_PUBLIC_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
      API_HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      BC_SECRET: ${BC_SECRET:-}
      BC_API_URL: ${BC_API_URL:-}
      BC_PARTNER_ID: ${BC_PARTNER_ID:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PSP_DEFAULT_PROVIDER: ${PSP_DEFAULT_PROVIDER:-stripe}
      PAYTR_MERCHANT_ID: ${PAYTR_MERCHANT_ID:-}
      PAYTR_MERCHANT_KEY: ${PAYTR_MERCHANT_KEY:-}
      PAYTR_MERCHANT_SALT: ${PAYTR_MERCHANT_SALT:-}
      PAYTR_TEST_MODE: ${PAYTR_TEST_MODE:-0}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4105/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  web:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://api:4105
    restart: unless-stopped
    environment:
      PORT: 3105
      HOSTNAME: 0.0.0.0
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      APP_PAYMENT_URL: ${APP_PAYMENT_URL:?set APP_PAYMENT_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3105/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  coolify:
    external: true
    name: ${COOLIFY_NETWORK:-coolify}
